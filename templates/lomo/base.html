{{ define "base" }}
<!DOCTYPE html>
<html lang="en" class="scroll-smooth motion-reduce:scroll-auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ .Description }}">
  <title>{{ .Title }}</title>
  <link rel="icon" href="/static/images/lomo/logo.webp" type="image/webp">
  <meta property="og:title" content="{{ .Title }}">
  <meta property="og:description" content="{{ .Description }}">
  <meta property="og:type" content="website">
  <meta property="og:image" content="/static/images/lomo/hero-river.webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;600;700&display=swap">
  <link rel="stylesheet" href="{{ .CSSFile }}">
  <script src="/static/js/alpine.min.js" defer></script>
</head>
<body class="min-h-screen font-lomo-body text-[15px] font-light antialiased {{ .BodyClass }}">
  <a href="#main-content" class="sr-only focus:not-sr-only focus:fixed focus:left-4 focus:top-4 focus:z-[100] focus:rounded focus:bg-white focus:px-4 focus:py-2 focus:text-sm focus:font-medium">
    Skip to content
  </a>

  {{ template "nav" . }}

  <main id="main-content">
    {{ template "content" . }}
  </main>

  {{ template "footer" . }}

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      document.body.classList.add('js-ready');
      const observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(e) {
          if (e.isIntersecting) {
            e.target.classList.add('is-visible');
            observer.unobserve(e.target);
          }
        });
      }, { threshold: 0.1 });
      document.querySelectorAll('[data-reveal]').forEach(function(el) {
        observer.observe(el);
      });
    });
  </script>
</body>
</html>
{{ end }}
