{{ define "content" }}
<section style="background: var(--color-dark-bg); padding: var(--section-padding-y) 1.5rem; min-height: 40vh; display: flex; align-items: center;">
  <div style="max-width: var(--content-max-width); margin: 0 auto;">
    <h1 style="font-family: var(--font-display); font-size: var(--text-h1); color: var(--color-dark-text);">Posts</h1>
    <p style="color: var(--color-dark-muted); font-size: 1.2rem;">Articles about web development, small business, and technology.</p>
  </div>
</section>
<section style="background: var(--color-light-bg); padding: var(--section-padding-y) 1.5rem;">
  <div style="max-width: 680px; margin: 0 auto;">
    {{ range .Posts }}
    <article style="margin-bottom: 2.5rem;">
      <a href="/posts/{{ .Slug }}" style="text-decoration: none;">
        <h2 style="font-family: var(--font-display); font-size: var(--text-h2); color: var(--color-light-text); margin-bottom: 0.25rem;">{{ .Title }}</h2>
      </a>
      <p style="font-family: var(--font-mono); font-size: var(--text-small); color: var(--color-light-muted); margin-bottom: 0.5rem;">{{ .Date }}</p>
      {{ if .Description }}
      <p style="color: var(--color-light-muted);">{{ .Description }}</p>
      {{ end }}
    </article>
    {{ end }}
  </div>
</section>
{{ end }}
