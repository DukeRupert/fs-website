{{ define "content" }}
<section style="background: var(--color-dark-bg); min-height: 80vh; display: flex; align-items: center; justify-content: center;">
  <div style="text-align: center; padding: 0 1.5rem;">
    <h1 style="font-family: var(--font-display); font-size: var(--text-display); color: var(--color-dark-text);">404</h1>
    <p style="color: var(--color-dark-muted); font-size: 1.2rem; margin-bottom: 2rem;">The page you're looking for doesn't exist.</p>
    <a href="/" style="border: 1px solid var(--color-accent); color: var(--color-accent); background: transparent; padding: 0.75rem 1.75rem; font-family: var(--font-body); font-size: 0.9375rem; text-decoration: none; border-radius: var(--border-radius-card);">Back to home</a>
  </div>
</section>
{{ end }}
