{{ define "nav" }}
<nav class="ff-nav"
     x-data="{ open: false }"
     x-on:keydown.escape.window="open = false">
  <a href="/" class="ff-logo">
    <img src="/static/images/logo/firefly_logo_raw_white.svg" alt="" width="24" height="20" aria-hidden="true">
    Firefly Software
  </a>

  <ul class="ff-nav-links">
    <li><a href="/work">Work</a></li>
    <li><a href="/process">Process</a></li>
    <li><a href="/pricing">Pricing</a></li>
    <li><a href="/about">About</a></li>
  </ul>

  <a href="/contact" class="ff-nav-cta">Start a project</a>

  <!-- Mobile hamburger -->
  <button class="ff-nav-hamburger"
          @click="open = !open"
          :aria-expanded="open"
          aria-label="Toggle navigation">
    <span :style="open ? 'transform: rotate(45deg) translate(4px, 4px)' : ''"></span>
    <span :style="open ? 'opacity: 0' : ''"></span>
    <span :style="open ? 'transform: rotate(-45deg) translate(4px, -4px)' : ''"></span>
  </button>

  <!-- Mobile overlay -->
  <div class="ff-nav-overlay"
       x-show="open"
       x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0"
       x-transition:enter-end="opacity-100"
       x-transition:leave="transition ease-in duration-150"
       x-transition:leave-start="opacity-100"
       x-transition:leave-end="opacity-0"
       x-cloak>
    <a href="/work" @click="open = false">Work</a>
    <a href="/process" @click="open = false">Process</a>
    <a href="/pricing" @click="open = false">Pricing</a>
    <a href="/about" @click="open = false">About</a>
    <a href="/contact" @click="open = false">Contact</a>
  </div>
</nav>
{{ end }}
