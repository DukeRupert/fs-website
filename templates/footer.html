{{ define "footer" }}
<footer class="footer">
  <div class="content-wrap">
    <!-- Three-column layout -->
    <div class="footer__columns">
      <!-- Col 1: Logo + tagline -->
      <div class="footer__col">
        <a href="/">
          <img src="/static/images/logo/logo_two_full.png" alt="Firefly Software" width="140" height="32" class="footer__logo">
        </a>
        <p class="footer__tagline">Websites, fixes, and software — built for small businesses.</p>
      </div>

      <!-- Col 2: Nav links -->
      <div class="footer__col">
        <nav class="footer__nav" aria-label="Footer navigation">
          <a href="/work" class="footer__link">Work</a>
          <a href="/services/websites" class="footer__link">Services</a>
          <a href="/process" class="footer__link">Process</a>
          <a href="/about" class="footer__link">About</a>
          <a href="/contact" class="footer__link">Contact</a>
          <a href="/posts/" class="footer__link">Posts</a>
        </nav>
      </div>

      <!-- Col 3: Contact info -->
      <div class="footer__col">
        <a href="tel:+14068719875" class="footer__link">{{ .Site.Phone }}</a>
        <a href="mailto:{{ .Site.Email }}" class="footer__link">{{ .Site.Email }}</a>
      </div>
    </div>

    <!-- Bottom bar -->
    <div class="footer__bottom">
      <span>&copy; 2026 Firefly Software, LLC.</span>
      <span>Based in Helena, Montana. Working with clients across the US.</span>
    </div>
  </div>
</footer>
{{ end }}
